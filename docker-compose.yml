version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/jarvis
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      N8N_API_URL: ${N8N_API_URL:-http://n8n:5678/api/v1}
      N8N_API_KEY: ${N8N_API_KEY:-}
      GMAIL_USER_EMAIL: ${GMAIL_USER_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_BACKEND_WS_URL: wss://jarvis.obyz.biz/ws
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: n8n.obyz.biz
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.obyz.biz
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-jarvis-n8n-2026-secret}
      GENERIC_TIMEZONE: Europe/Paris
      N8N_USER_MANAGEMENT_JWT_SECRET: ${SECRET_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  redis_data:
  n8n_data:
